<!-- template: { "id": "thank-you-samagam5", "name": "Thank You for Donation", "title": "ThankYou_Samagam5___#name#_", "width": 600, "height": 750 } -->
<div style="
  width: 100%; height: 100%;
  position: relative;
  overflow: hidden;
  font-family: Calibri, sans-serif;
">
  <img src="/brandings/TYS.png" alt="" style="
    display: block;
    width: 100%; height: 100%;
  " />

  <!-- Donor info — centered in the large empty space -->
  <div style="
    position: absolute;
    top: 33.5%;
    left: 0;
    width: 100%;
    padding: 10px 16px 18px;
    text-align: center;
    border: none;
    border-top: 12px solid #4233fb;
    border-bottom: 12px solid #4233fb;
    border-radius: 0;
  ">
    <!-- Thank You heading in Hindi -->
    <p style="
      margin: 0 0 10px;
      font-size: 40px; font-weight: 800;
      color: #4233fb;
      font-family: Georgia, 'Times New Roman', serif;
      letter-spacing: 1px;
    ">सहयोग के लिए हार्दिक आभार</p>

    <!-- Decorative divider -->
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;">
      <div style="width:50px;height:1.5px;background:linear-gradient(90deg,transparent,#4233fb);"></div>
      <div style="width:7px;height:7px;border:1.5px solid #4233fb;transform:rotate(45deg);"></div>
      <div style="width:50px;height:1.5px;background:linear-gradient(90deg,#4233fb,transparent);"></div>
    </div>

    <!-- Name -->
    <p style="
      margin: 0 0 8px;
      font-size: 36px; font-weight: 700;
      color: #4233fb;
      word-break: break-word;
    ">{{name|Name}}</p>

    <!-- JNV + Batch -->
    <p style="
      margin: 0 0 10px;
      font-size: 22px; color: #4233fb;
      letter-spacing: 0.5px; font-weight: 500;
    ">{{jnv|JNV Name}} {{batch|Batch}}</p>

    <!-- Donation Amount -->
    <p style="
      margin: 0 0 12px;
      font-size: 34px; font-weight: 800;
      color: #4233fb;
      letter-spacing: 0.5px;
    ">&#8377; {{amount|Amount}}</p>
  </div>
</div>
